# Nginx config snippet to serve image-review at /review/ on the existing static subdomain.
# This adds a location block — you'll need to merge it into the main vhost OR include it.
# Cleanest: add an `include /etc/nginx/snippets/image-review.conf;` inside the existing server{} block.

# /etc/nginx/snippets/image-review.conf
location /review/ {
    proxy_pass http://127.0.0.1:8196/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
}
